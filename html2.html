<!DOCTYPE html>

<head>
    <title>포스트잇</title>

</head>
<style>
    #포스트 {
        text-align: center;
        margin-top: 50px;
    }

    #포스트잇 {
        margin-top: 100px;
        margin-left: 1600px;
        width: 300px;
        height: auto;
    }

    #입력 {
        margin-top: 20px;
        margin-left: 1650px;
        width: 200px;
        height: 30px;
        border: 1px;
    }


    body,
    html,
    #drop {
        width: 100%;
        height: 100%;
        background-color: aqua;
        animation-name: dropp;
        animation-duration: 3s;
        animation-iteration-count: infinite;
        position: absolute;
        cursor: grab;
        user-select: none;



    }

    body,
    html {
        background-color:aqua;
        animation-name: 배이경;
        width: 100%;
        height: 100%;
        animation-duration: 3s;


    }

    @keyframes 배이경 {
        0% {
            background-color:aqua;
        }
        25% {
            background-color:rgb(55, 158, 158);
        }

        50% {
            background-color:rgb(59, 158, 158);
        }

        75% {
            background-color:rgb(50, 99, 99);
        }

        100%{
         background-color:rgb(43, 73, 73);
        }
    }

    #포스트잇.dragging {
        cursor: grabbing;
    }

    @keyframes dropp {
        0% {
            color: aqua;
        }

        25% {
            color: rgb(53, 190, 190);

        }

        50% {
            color: rgb(48, 156, 156);
        }

        75% {
            color: rgb(48, 151, 151);
        }

        100% {
            color: rgb(46, 172, 172);
        }

    }

    .버튼 {
        animation-name: 버어튼;
        background-color:beige;
    }

</style>

<body>
    <h1 id="포스트">포스트잇을 붙여주세요</h1>

    <form action="https://eoewu5508txx11n.m.pipedream.net" method="get">

        <div>


            <img id="포스트잇" src="ff.jpg.png" alt="포스트잇을 불러오는중..">
            <input id="입력" type="text" name="입력한내용" value="티원을 응원하는 한마디" for="한마디">
            <button type="submit" class="버튼" for="전송">확인</button>

        </div>
    </form>

    <div id="drop">

    </div>




    <script>

        alert("티원을 응원해주는 한마디를 적어주세요!");




    </script>

</body>

</html>
