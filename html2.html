<!DOCTYPE html>
<html lang="ko">


<head>

    <title>포스트잇</title>

<style>
    #포스트 {
        text-align: center;
        margin-top: 50px;
    }

        margin-top: 100px;
        margin-left: 1600px;

    body {

        animation-name: dropp;

        animation-iteration-count: infinite;
        position: absolute;
        user-select: none;

        75% {

        }

        100% {

        }

    }

    .alertdiv {

    /*1340px 980px 코드 경계선*/

<!--disabled 요소 비활성화 (css) disabled:ture=요소 비활성화 disabled:false=활성화     -->

</body>
