    body,

    #drop {
        width: 100%;
        height: 100%;
        background-color: aqua;
        animation-name: dropp;
        animation-duration: 3s;
        animation-iteration-count: infinite;
        position: absolute;
        cursor: grab;
        user-select: none;



    }

    포스트잇.dragging {
        cursor: grabbing;
    }

    @keyframes dropp {
        0% {
            color: aqua;
        }

        25% {
            color: rgb(53, 190, 190);

        }

        50% {
            color: rgb(48, 156, 156);
        }

        75% {
            color: rgb(48, 151, 151);
        }

        100% {
            color: rgb(46, 172, 172);
        }

    }
</style>
